{% extends "base.html" %}

{% block title %}Administration — Cà Phê Việt{% endblock %}

{% block content %}

<div style="min-height: 100vh; background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-brown) 60%, #6B3D1F 100%);
            display: flex; align-items: center; padding: 40px 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

        <!-- Logo centré -->
        <div class="text-center mb-4">
          <div style="font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--brand-gold);">
            Cà Phê Việt
          </div>
          <div style="font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(245,236,215,0.55); margin-top:2px;">
            Espace Administration
          </div>
        </div>

        <!-- Carte login -->
        <div style="background:#fff; border-radius:4px; overflow:hidden;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);">

          <!-- Barre top dorée -->
          <div style="height:4px; background:linear-gradient(90deg, var(--brand-brown), var(--brand-gold));"></div>

          <div class="p-5">

            <div class="text-center mb-4">
              <div style="width:60px; height:60px; background:var(--brand-cream); border-radius:50%;
                          display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;
                          border:2px solid rgba(74,44,23,0.15);">
                <i class="bi bi-shield-lock" style="font-size:1.6rem; color:var(--brand-brown);"></i>
              </div>
              <h2 style="font-size:1.5rem; color:var(--brand-brown); margin-bottom:0.25rem;">Connexion</h2>
              <p style="font-size:0.82rem; color:var(--text-muted);">Accès réservé aux administrateurs</p>
            </div>

            <!-- Erreur -->
            {% if error %}
            <div class="alert mb-4" style="background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.25); border-radius:2px; color:#c0392b; font-size:0.88rem; padding:0.75rem 1rem;">
              <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('admin_login') }}" novalidate>

              <div class="mb-4">
                <label class="form-label"
                       style="font-size:0.78rem; font-weight:700; letter-spacing:0.12em;
                              text-transform:uppercase; color:var(--brand-brown);">
                  Clé d'accès
                </label>
                <div class="input-group">
                  <span class="input-group-text"
                        style="background:var(--brand-light); border-color:rgba(74,44,23,0.2);
                               border-right:none; border-radius:0; color:var(--brand-brown);">
                    <i class="bi bi-key"></i>
                  </span>
                  <input type="password"
                         name="key"
                         id="admin-key"
                         required
                         autofocus
                         placeholder="Entrez la clé d'accès"
                         class="form-control"
                         style="border-color:rgba(74,44,23,0.2); border-left:none; border-radius:0;
                                font-size:0.95rem; padding:0.7rem 1rem;"
                         autocomplete="current-password">
                  <button type="button" id="toggle-pwd"
                          class="input-group-text"
                          style="background:var(--brand-light); border-color:rgba(74,44,23,0.2);
                                 border-left:none; border-radius:0; cursor:pointer; color:var(--text-muted);">
                    <i class="bi bi-eye" id="eye-icon"></i>
                  </button>
                </div>
              </div>

              <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="remember" id="remember"
                         style="accent-color:var(--brand-brown);">
                  <label class="form-check-label" for="remember"
                         style="font-size:0.82rem; color:var(--text-muted);">
                    Rester connecté
                  </label>
                </div>
              </div>

              <button type="submit" class="btn-brand btn w-100 py-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Accéder au tableau de bord
              </button>

            </form>

          </div>
        </div>

        <!-- Lien retour site -->
        <div class="text-center mt-4">
          <a href="{{ url_for('index') }}"
             style="color:rgba(245,236,215,0.5); font-size:0.82rem; text-decoration:none; transition:color 0.2s;"
             onmouseover="this.style.color='rgba(212,168,71,0.9)'"
             onmouseout="this.style.color='rgba(245,236,215,0.5)'">
            <i class="bi bi-arrow-left me-1"></i>Retour au site
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  // Toggle password visibility
  document.getElementById('toggle-pwd').addEventListener('click', function() {
    const input = document.getElementById('admin-key');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });
</script>
{% endblock %}
